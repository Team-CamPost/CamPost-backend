services:
  - type: web
    name: campost-backend
    runtime: docker
    plan: free
    branch: dev
    rootDir: CamPost-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
        value: 3
      - key: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
        value: 0
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_MS
        value: 3600000
      - key: JWT_REFRESH_EXPIRY_MS
        value: 1209600000
      - key: APP_MAIL_VERIFICATION_SENDER
        value: logging
      - key: IMPORTER_ENABLED
        value: false
      - key: AI_MOCK
        value: true
