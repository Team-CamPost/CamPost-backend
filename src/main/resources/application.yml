server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campost-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  importer:
    enabled: ${IMPORTER_ENABLED:true}
    raw-store-dir: ${RAW_STORE_DIR:/data/raw}
    initial-delay-ms: ${IMPORTER_INITIAL_DELAY_MS:5000}
    fixed-delay-ms: ${IMPORTER_FIXED_DELAY_MS:30000}
    batch-size: ${IMPORTER_BATCH_SIZE:100}
