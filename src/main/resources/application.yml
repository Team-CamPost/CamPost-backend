server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: campost-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    access-expiry-ms: ${JWT_EXPIRY_MS}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}
  mail:
    verification-sender: ${APP_MAIL_VERIFICATION_SENDER:logging}
    from: ${APP_MAIL_FROM:no-reply@campost.local}
  files:
    dir: ${FILES_DIR:/data/files}
  importer:
    enabled: ${IMPORTER_ENABLED:true}
    api-token: ${IMPORTER_API_TOKEN:}
    raw-store-dir: ${RAW_STORE_DIR:/data/raw}
    initial-delay-ms: ${IMPORTER_INITIAL_DELAY_MS:5000}
    fixed-delay-ms: ${IMPORTER_FIXED_DELAY_MS:30000}
    batch-size: ${IMPORTER_BATCH_SIZE:100}
